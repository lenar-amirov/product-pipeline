<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новая инициатива — Pipeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --header-bg: #1e293b;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --error-bg: #fef2f2;
      --error-border: #fca5a5;
      --error-text: #991b1b;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      background: var(--header-bg);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header .logo {
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -.01em;
    }
    header .user-badge {
      font-size: 14px;
      color: #94a3b8;
    }

    /* ---- Main ---- */
    main {
      display: flex;
      justify-content: center;
      padding: 48px 20px 80px;
    }

    .form-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      width: 100%;
      max-width: 500px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 20px;
      transition: color .15s;
    }
    .back-link:hover { color: var(--primary); }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 28px;
    }

    /* ---- Error box ---- */
    .error-box {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* ---- Form ---- */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
    label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    input[type="text"] {
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }
    input[type="text"]:focus { border-color: var(--primary); }
    input[type="text"]::placeholder { color: var(--text-muted); }
    .hint {
      font-size: 12px;
      color: var(--text-muted);
    }

    .btn-submit {
      display: block;
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: background .15s;
    }
    .btn-submit:hover { background: var(--primary-hover); }
    .btn-submit:active { transform: scale(.99); }
  </style>
</head>
<body>

<header>
  <span class="logo">PM Pipeline</span>
  <span class="user-badge">{{ pm }}</span>
</header>

<main>
  <div class="form-card">
    <a href="/{{ pm }}/" class="back-link">← Все инициативы</a>
    <h1>Новая инициатива</h1>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/{{ pm }}/new">
      <div class="field">
        <label for="name">Название</label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="loyalty-program"
          pattern="[a-z0-9-]+"
          required
          autofocus
          value="{{ request.form.get('name', '') }}"
        >
        <span class="hint">Только строчные латинские буквы и дефисы</span>
      </div>

      <button type="submit" class="btn-submit">Создать и открыть</button>
    </form>
  </div>
</main>

</body>
</html>
